<!DOCTYPE html>
<html>
<head>
    <title>Seed Detection</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:#0f172a;
            color:white;
            min-height:100vh;
            padding:20px;
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            font-size:32px;
            color:#f8fafc;
        }

        #dashboard{
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
            margin-bottom:25px;
        }

        .card{
            width:180px;
            padding:20px;
            border-radius:18px;
            text-align:center;
            box-shadow:0 4px 15px rgba(0,0,0,0.3);
        }

        .papaya{
            background:linear-gradient(135deg,#14532d,#22c55e);
        }

        .pepper{
            background:linear-gradient(135deg,#7f1d1d,#ef4444);
        }

        .card h2{
            font-size:22px;
            margin-bottom:10px;
        }

        .count{
            font-size:42px;
            font-weight:bold;
        }

        #cameraSection{
            display:flex;
            justify-content:center;
            margin-top:20px;
        }

        #container{
            position:relative;
            width:95%;
            max-width:700px;
            display:none;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 8px 30px rgba(0,0,0,0.5);
        }

        video{
            width:100%;
            display:block;
        }

        canvas{
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            pointer-events:none;
        }

        #startBtn{
            display:block;
            margin:auto;
            background:#2563eb;
            color:white;
            border:none;
            padding:14px 28px;
            border-radius:12px;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        #startBtn:hover{
            background:#1d4ed8;
            transform:scale(1.03);
        }

    </style>
</head>

<body>

<h1>Seed Detection</h1>

<div id="dashboard">

    <div class="card papaya">
        <h2>Papaya</h2>
        <div class="count" id="papayaCount">0</div>
    </div>

    <div class="card pepper">
        <h2>Pepper</h2>
        <div class="count" id="pepperCount">0</div>
        
    </div>

</div>

<button id="startBtn">Open Camera</button>

<div id="cameraSection">

    <div id="container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
