<!DOCTYPE html>
<html>
<head>
    <title>Seed Detection</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Times New Roman', Times, serif;
        }

        body{
            background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 100%);
            color: #333;
            min-height:100vh;
            padding:20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .company-name {
            font-size: 28px;
            font-weight: bold;
            color: #2d5016;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .project-title {
            font-size: 22px;
            color: #1e3a8a;
            font-style: italic;
            margin-bottom: 25px;
            font-weight: 600;
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            font-size:32px;
            color: #1e3a8a;
            font-weight: bold;
        }

        #dashboard{
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
            margin-bottom:25px;
        }

        .card{
            width:200px;
            padding:25px;
            border-radius:18px;
            text-align:center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border: 2px solid #ddd;
        }

        .papaya{
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            border-color: #66bb6a;
        }

        .pepper{
            background: linear-gradient(135deg, #ffebee, #ffcdd2);
            border-color: #ef5350;
        }

        .card h2{
            font-size:24px;
            margin-bottom:10px;
            color: #333;
            font-weight: bold;
        }

        .count{
            font-size:48px;
            font-weight:bold;
            color: #1e3a8a;
        }

        #cameraSection{
            display:flex;
            justify-content:center;
            margin-top:20px;
        }

        #container{
            position:relative;
            width:95%;
            max-width:700px;
            display:none;
            border-radius:20px;
            overflow:hidden;
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
            border: 3px solid #2d5016;
        }

        video{
            width:100%;
            display:block;
        }

        canvas{
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            pointer-events:none;
        }

        #startBtn{
            display:block;
            margin:auto;
            background: #2d5016;
            color:white;
            border:none;
            padding:14px 28px;
            border-radius:12px;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
            font-weight: bold;
            font-family: 'Times New Roman', Times, serif;
        }

        #startBtn:hover{
            background: #1e3a8a;
            transform:scale(1.03);
        }

    </style>
</head>

<body>

<div class="header">
    <div class="company-name">🌿 KVB GREEN ENERGIES 🌿</div>
    <div class="project-title">Detection of Papaya Seed Adulteration in Black Pepper</div>
</div>

<h1>Live Detection Stream</h1>

<div id="dashboard">

    <div class="card papaya">
        <h2>Papaya Seeds</h2>
        <div class="count" id="papayaCount">0</div>
    </div>

    <div class="card pepper">
        <h2>Pepper Seeds</h2>
        <div class="count" id="pepperCount">0</div>
        
    </div>

</div>

<button id="startBtn">🎥 Open Camera</button>

<div id="cameraSection">

    <div id="container">
<video id="video" autoplay playsinline muted></video>        <canvas id="canvas"></canvas>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
