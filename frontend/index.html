<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeedScan Pro | KVB Green Energies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2d5016;
            --primary-light: #4c8c2b;
            --accent: #1e3a8a;
            --bg-dark: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --papaya: #4ade80;
            --pepper: #f87171;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(45, 80, 22, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(30, 58, 138, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header & Branding */
        header {
            padding: 2rem 1rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(45, 80, 22, 0.4);
        }

        .company-name {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--primary-light);
            text-transform: uppercase;
        }

        .project-title {
            font-size: 0.9rem;
            color: var(--text-dim);
            font-weight: 400;
        }

        /* Main Dashboard */
        main {
            flex: 1;
            padding: 1.5rem;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            background: var(--card-bg);
            padding: 0.75rem 1.25rem;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #64748b;
        }

        .dot.online { background: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .dot.offline { background: #ef4444; }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.25rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: left;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .stat-card:active { transform: scale(0.98); }

        .stat-card::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 60px;
            height: 60px;
            background: currentColor;
            opacity: 0.05;
            border-radius: 0 0 0 100%;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
            display: block;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1;
        }

        .stat-card.papaya { color: var(--papaya); border-left: 4px solid var(--papaya); }
        .stat-card.pepper { color: var(--pepper); border-left: 4px solid var(--pepper); }

        /* Camera Viewport */
        .viewport-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .camera-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.9);
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        .camera-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Controls */
        .controls {
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 16px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 8px 20px rgba(45, 80, 22, 0.3);
        }

        .btn-primary:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-dim);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        /* Settings Modal */
        #settingsModal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal-content {
            background: #1e293b;
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-title {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.75rem 1rem;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        @media (max-width: 480px) {
            header { padding: 1rem; }
            .stat-value { font-size: 2rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="brand-group">
        <div class="logo-icon">🌿</div>
        <div class="company-name">KVB GREEN ENERGIES</div>
    </div>
    <div class="project-title">SeedScan AI: Papaya & Pepper Detection</div>
</header>

<main>
    <div class="status-bar">
        <div class="status-indicator">
            <div id="statusDot" class="dot"></div>
            <span id="statusText">System Ready</span>
        </div>
        <button id="settingsBtn" class="btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.75rem; border-radius: 100px;">
            ⚙️ Settings
        </button>
    </div>

    <div class="stats-grid">
        <div class="stat-card papaya">
            <span class="stat-label">Papaya Seeds</span>
            <div class="stat-value" id="papayaCount">0</div>
        </div>
        <div class="stat-card pepper">
            <span class="stat-label">Pepper Seeds</span>
            <div class="stat-value" id="pepperCount">0</div>
        </div>
    </div>

    <div class="viewport-container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        <div id="cameraOverlay" class="camera-overlay">
            <div style="text-align: center;">
                <p style="margin-bottom: 1.5rem; color: var(--text-dim);">Camera stream inactive</p>
                <button id="startBtn" class="btn btn-primary">
                    📸 Initialize Camera
                </button>
            </div>
        </div>
    </div>
</main>

<div class="controls">
    <p style="font-size: 0.8rem; color: var(--text-dim); text-align: center; margin-bottom: 0.5rem;">
        Using Rear Camera Optimized for Detection
    </p>
</div>

<div id="settingsModal">
    <div class="modal-content">
        <h3 class="modal-title">System Settings</h3>
        <div class="form-group">
            <label>Backend Host IP (e.g. 192.168.1.15)</label>
            <input type="text" id="hostInput" placeholder="192.168.1.15">
        </div>
        <div class="form-group">
            <label>Backend Port</label>
            <input type="number" id="portInput" value="8000">
        </div>
        <div style="display: flex; gap: 1rem;">
            <button id="saveSettings" class="btn btn-primary" style="flex: 1;">Save</button>
            <button id="closeSettings" class="btn btn-outline">Cancel</button>
        </div>
    </div>
</div>

<script src="app.js"></script>

</body>
</html>
